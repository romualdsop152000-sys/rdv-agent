databases:
  - name: rdvagent-db
    databaseName: rdvagent
    user: rdvagent
    plan: free
    postgresMajorVersion: 16

services:

  # ── MLflow tracking server ──────────────────────────────────────────────────
  - type: web
    name: rdvagent-mlflow
    runtime: docker
    dockerfilePath: ./Dockerfile.mlflow
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "5000"

  # ── Streamlit app ───────────────────────────────────────────────────────────
  - type: web
    name: rdvagent-app
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /_stcore/health
    envVars:
      # Injectées manuellement dans le dashboard Render (secrets)
      - key: OPENAI_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: APP_PASSWORD
        sync: false
      - key: HUBSPOT_API_KEY
        sync: false
      - key: LANGCHAIN_API_KEY
        sync: false
      - key: LANGCHAIN_PROJECT
        value: rdv-prep-agent

      # Injectées automatiquement depuis les services Render
      - key: DATABASE_URL
        fromDatabase:
          name: rdvagent-db
          property: connectionString
      - key: REDIS_URL
        sync: false           # Upstash — coller l'URL depuis upstash.com
      - key: MLFLOW_TRACKING_URI
        fromService:
          name: rdvagent-mlflow
          type: web
          property: hostport   # https://rdvagent-mlflow.onrender.com